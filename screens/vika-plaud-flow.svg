<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Схема работы Vika Plaud: запись, расшифровка, ваш сервер">
  <!-- ===== ФОН ===== -->
  <rect x="0" y="0" width="1200" height="630" fill="#F2F8F4"/>

  <!-- ===== ХЕДЕР ===== -->
  <!-- плашка-тег -->
  <rect x="490" y="30" width="220" height="36" rx="8" fill="#E07A7A" stroke="#000" stroke-width="3"/>
  <text x="600" y="54" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="15" font-weight="700" fill="#000" letter-spacing="1">AI-ДИКТОФОН</text>
  <!-- заголовок -->
  <text x="600" y="118" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="34" font-weight="800" fill="#000">Vika Plaud — как это устроено</text>

  <!-- ===== СТРЕЛКИ (рисуем до карточек, карточки поверх краёв) ===== -->
  <g stroke="#000" stroke-width="5" stroke-linecap="round">
    <line x1="372" y1="292" x2="428" y2="292"/>
    <line x1="762" y1="292" x2="818" y2="292"/>
  </g>
  <polygon points="428,281 448,292 428,303" fill="#000"/>
  <polygon points="818,281 838,292 818,303" fill="#000"/>

  <!-- ===== КАРТОЧКА 1 — ЗАПИСЬ ===== -->
  <rect x="68" y="162" width="300" height="356" rx="8" fill="#000"/>
  <rect x="60" y="170" width="300" height="356" rx="8" fill="#FFFFFF" stroke="#000" stroke-width="4"/>
  <!-- бейдж шага -->
  <rect x="82" y="198" width="42" height="42" rx="6" fill="#E07A7A" stroke="#000" stroke-width="3"/>
  <text x="103" y="227" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="24" font-weight="800" fill="#000">1</text>
  <!-- плашка иконки -->
  <g transform="translate(154,236)">
    <rect x="0" y="0" width="112" height="112" rx="8" fill="#E07A7A" stroke="#000" stroke-width="4"/>
    <!-- микрофон -->
    <rect x="41" y="20" width="30" height="44" rx="15" fill="#FFFFFF" stroke="#000" stroke-width="4"/>
    <path d="M 31 52 Q 56 84 81 52" fill="none" stroke="#000" stroke-width="4" stroke-linecap="round"/>
    <line x1="56" y1="68" x2="56" y2="88" stroke="#000" stroke-width="4" stroke-linecap="round"/>
    <line x1="42" y1="88" x2="70" y2="88" stroke="#000" stroke-width="4" stroke-linecap="round"/>
  </g>
  <!-- заголовок шага -->
  <text x="210" y="396" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="26" font-weight="800" fill="#000">Запись</text>
  <!-- подпись -->
  <text x="210" y="430" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="15" fill="#111">Встречи и заметки</text>
  <text x="210" y="454" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="15" fill="#111">одним нажатием</text>

  <!-- ===== КАРТОЧКА 2 — РАСШИФРОВКА ===== -->
  <rect x="458" y="162" width="300" height="356" rx="8" fill="#000"/>
  <rect x="450" y="170" width="300" height="356" rx="8" fill="#FFFFFF" stroke="#000" stroke-width="4"/>
  <rect x="472" y="198" width="42" height="42" rx="6" fill="#E07A7A" stroke="#000" stroke-width="3"/>
  <text x="493" y="227" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="24" font-weight="800" fill="#000">2</text>
  <g transform="translate(544,236)">
    <rect x="0" y="0" width="112" height="112" rx="8" fill="#E07A7A" stroke="#000" stroke-width="4"/>
    <!-- звуковая волна -->
    <rect x="10" y="42" width="9" height="28" rx="3" fill="#000"/>
    <rect x="24" y="30" width="9" height="52" rx="3" fill="#000"/>
    <rect x="38" y="46" width="9" height="20" rx="3" fill="#000"/>
    <!-- стрелка волна -> текст -->
    <polygon points="52,48 63,56 52,64" fill="#000"/>
    <!-- строки текста -->
    <rect x="68" y="44" width="34" height="6" rx="3" fill="#000"/>
    <rect x="68" y="55" width="34" height="6" rx="3" fill="#000"/>
    <rect x="68" y="66" width="22" height="6" rx="3" fill="#000"/>
  </g>
  <text x="600" y="396" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="26" font-weight="800" fill="#000">Расшифровка</text>
  <text x="600" y="430" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="15" fill="#111">Движок Vika Voice,</text>
  <text x="600" y="454" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="15" fill="#111">приватно</text>

  <!-- ===== КАРТОЧКА 3 — ВАШ СЕРВЕР ===== -->
  <rect x="848" y="162" width="300" height="356" rx="8" fill="#000"/>
  <rect x="840" y="170" width="300" height="356" rx="8" fill="#FFFFFF" stroke="#000" stroke-width="4"/>
  <rect x="862" y="198" width="42" height="42" rx="6" fill="#E07A7A" stroke="#000" stroke-width="3"/>
  <text x="883" y="227" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="24" font-weight="800" fill="#000">3</text>
  <g transform="translate(934,236)">
    <rect x="0" y="0" width="112" height="112" rx="8" fill="#E07A7A" stroke="#000" stroke-width="4"/>
    <!-- стойка сервера -->
    <rect x="8" y="20" width="62" height="20" rx="4" fill="#FFFFFF" stroke="#000" stroke-width="4"/>
    <rect x="8" y="46" width="62" height="20" rx="4" fill="#FFFFFF" stroke="#000" stroke-width="4"/>
    <rect x="8" y="72" width="62" height="20" rx="4" fill="#FFFFFF" stroke="#000" stroke-width="4"/>
    <circle cx="18" cy="30" r="3.5" fill="#000"/>
    <circle cx="18" cy="56" r="3.5" fill="#000"/>
    <circle cx="18" cy="82" r="3.5" fill="#000"/>
    <!-- замок -->
    <path d="M 80 58 L 80 50 C 80 40 98 40 98 50 L 98 58" fill="none" stroke="#000" stroke-width="4"/>
    <rect x="74" y="58" width="30" height="26" rx="4" fill="#FFFFFF" stroke="#000" stroke-width="4"/>
    <circle cx="89" cy="68" r="3" fill="#000"/>
    <line x1="89" y1="68" x2="89" y2="76" stroke="#000" stroke-width="3" stroke-linecap="round"/>
  </g>
  <text x="990" y="396" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="26" font-weight="800" fill="#000">Ваш сервер</text>
  <text x="990" y="430" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="15" fill="#111">Данные у компании,</text>
  <text x="990" y="454" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="15" fill="#111">не в чужом облаке</text>

  <!-- ===== ФУТЕР-ПЛАШКА ===== -->
  <rect x="418" y="548" width="380" height="44" rx="8" fill="#000"/>
  <rect x="410" y="556" width="380" height="44" rx="8" fill="#E07A7A" stroke="#000" stroke-width="4"/>
  <text x="600" y="584" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="15" font-weight="700" fill="#000" letter-spacing="1">ДАННЫЕ НЕ ПОКИДАЮТ ВАШ КОНТУР</text>
</svg>
