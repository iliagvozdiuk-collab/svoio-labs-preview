  <text x="235" y="536" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="14" fill="#333">Тема</text>
  <text x="235" y="556" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="14" fill="#333">и контекст</text>

  <!-- Card 5: Раскадровка -->
  <rect x="453" y="390" width="310" height="170" rx="8" fill="#111"/>
  <rect x="445" y="398" width="310" height="170" rx="8" fill="#FFFFFF" stroke="#111" stroke-width="4"/>
  <g transform="translate(564,414)">
    <rect x="0" y="0" width="72" height="72" rx="8" fill="#E0A54B" stroke="#111" stroke-width="4"/>
    <rect x="12" y="22" width="48" height="30" rx="2" fill="#FFFFFF" stroke="#111" stroke-width="4"/>
    <line x1="12" y1="30" x2="60" y2="30" stroke="#111" stroke-width="3"/>
    <line x1="12" y1="44" x2="60" y2="44" stroke="#111" stroke-width="3"/>
    <rect x="17" y="24" width="5" height="4" fill="#111"/>
    <rect x="26" y="24" width="5" height="4" fill="#111"/>
    <rect x="35" y="24" width="5" height="4" fill="#111"/>
    <rect x="44" y="24" width="5" height="4" fill="#111"/>
    <rect x="17" y="46" width="5" height="4" fill="#111"/>
    <rect x="26" y="46" width="5" height="4" fill="#111"/>
    <rect x="35" y="46" width="5" height="4" fill="#111"/>
    <rect x="44" y="46" width="5" height="4" fill="#111"/>
    <line x1="28" y1="30" x2="28" y2="44" stroke="#111" stroke-width="3"/>
    <line x1="44" y1="30" x2="44" y2="44" stroke="#111" stroke-width="3"/>
  </g>
  <text x="600" y="510" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-weight="800" font-size="22" fill="#111">Раскадровка</text>
  <text x="600" y="536" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="14" fill="#333">Превью</text>
  <text x="600" y="556" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="14" fill="#333">до рендера</text>

  <!-- Card 6: Готовое видео -->
  <rect x="818" y="390" width="310" height="170" rx="8" fill="#111"/>
  <rect x="810" y="398" width="310" height="170" rx="8" fill="#FFFFFF" stroke="#111" stroke-width="4"/>
  <g transform="translate(929,414)">
    <rect x="0" y="0" width="72" height="72" rx="8" fill="#E0A54B" stroke="#111" stroke-width="4"/>
    <circle cx="36" cy="37" r="21" fill="#FFFFFF" stroke="#111" stroke-width="4"/>
    <path d="M29 26 L29 48 L49 37 Z" fill="#111"/>
  </g>
  <text x="965" y="510" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-weight="800" font-size="22" fill="#111">Готовое видео</text>
  <text x="965" y="536" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="14" fill="#333">Озвучка и субтитры</text>
  <text x="965" y="556" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="14" fill="#333">из коробки</text>

  <!-- ROW 2 arrows -->
  <line x1="396" y1="483" x2="427" y2="483" stroke="#111" stroke-width="5" stroke-linecap="round"/>
  <polygon points="427,474 427,492 443,483" fill="#111"/>
  <line x1="761" y1="483" x2="792" y2="483" stroke="#111" stroke-width="5" stroke-linecap="round"/>
  <polygon points="792,474 792,492 808,483" fill="#111"/>
</svg>
